version: '3.8'

services:
  obleas:
    build: .
    container_name: sistema-obleas
    restart: unless-stopped
    ports:
      - "3080:3000"
    environment:
      - APP_CLAVE=${APP_CLAVE}
      - NODE_ENV=production
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-https://panel.novagnc.com.ar/auth/google/callback-obleas}
      - PGHOST=${PGHOST}
      - PGPORT=${PGPORT:-5432}
      - PGDATABASE=${PGDATABASE:-cdp_nova}
      - PGUSER=${PGUSER}
      - PGPASSWORD=${PGPASSWORD}
    volumes:
      - obleas-data:/app/data
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

volumes:
  obleas-data:
    driver: local
